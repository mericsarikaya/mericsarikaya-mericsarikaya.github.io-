<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Meriç Sarıkaya</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo"><a href="index.html">Meriç<span>.</span></a></div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About Me</a>
            <a href="projects.html">Projects & Skills</a>
            <a href="contact.html" class="active">Contact</a>
            <a href="../contact.html" style="color: var(--primary-color); font-weight: bold; border-left: 2px solid var(--border-color); padding-left: 15px;">TR</a>
        </div>
    </nav>

    <main style="max-width: 600px;">
        <h2 class="section-title">Get in Touch</h2>
        <p>You can send me a direct message using the form below or visit my LinkedIn / GitHub profiles.</p>
        
        <div style="margin-bottom: 30px; display: flex; gap: 15px;">
            <a href="https://www.linkedin.com/in/mericsarikaya/" target="_blank" class="btn" style="background-color: #0077b5;">LinkedIn</a>
            <a href="https://github.com/mericsarikaya" target="_blank" class="btn" style="background-color: #333;">GitHub</a>
        </div>

        <div class="contact-form">
            <form action="https://formspree.io/f/xrergbrl" method="POST">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="Enter your full name">
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email address">
                </div>

                <div class="form-group">
                    <label for="subject">Subject</label>
                    <select id="subject" name="subject">
                        <option value="">Select a subject</option>
                        <option value="job">Job Offer / Internship</option>
                        <option value="freelance">Project Collaboration</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="5" placeholder="You can write your message in detail here..."></textarea>
                </div>

                <button type="submit" class="btn" style="width: 100%;">Send Message</button>
            </form>
        </div>
    </main>

    <footer>
        <p>© 2026 Meriç Sarıkaya. All rights reserved.</p>
    </footer>

</body>
</html>
