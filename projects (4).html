<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İletişim - Meriç Sarıkaya</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo"><a href="index.html">Meriç<span>.</span></a></div>
        <div class="nav-links">
            <a href="index.html">Ana Sayfa</a>
            <a href="about.html">Hakkımda</a>
            <a href="projects.html">Projeler & Yetenekler</a>
            <a href="contact.html" class="active">İletişim</a>
            <a href="en/contact.html" style="color: var(--primary-color); font-weight: bold; border-left: 2px solid var(--border-color); padding-left: 15px;">EN</a>
        </div>
    </nav>

    <main style="max-width: 600px;">
        <h2 class="section-title">Benimle İletişime Geçin</h2>
        <p>Aşağıdaki formu kullanarak bana doğrudan mesaj gönderebilir veya LinkedIn / GitHub profillerimi ziyaret edebilirsiniz.</p>
        
        <div style="margin-bottom: 30px; display: flex; gap: 15px;">
            <a href="https://www.linkedin.com/in/mericsarikaya/" target="_blank" class="btn" style="background-color: #0077b5;">LinkedIn</a>
            <a href="https://github.com/mericsarikaya" target="_blank" class="btn" style="background-color: #333;">GitHub</a>
        </div>

        <div class="contact-form">
            <form action="https://formspree.io/f/xrergbrl" method="POST">
                <div class="form-group">
                    <label for="name">Ad Soyad</label>
                    <input type="text" id="name" name="name" placeholder="Adınızı ve soyadınızı girin">
                </div>

                <div class="form-group">
                    <label for="email">E-posta</label>
                    <input type="email" id="email" name="email" placeholder="E-posta adresinizi girin">
                </div>

                <div class="form-group">
                    <label for="subject">Konu</label>
                    <select id="subject" name="subject">
                        <option value="">Konu seçiniz</option>
                        <option value="job">İş Teklifi / Staj</option>
                        <option value="freelance">Proje İşbirliği</option>
                        <option value="other">Diğer</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="message">Mesaj</label>
                    <textarea id="message" name="message" rows="5" placeholder="Mesajınızı detaylıca yazabilirsiniz..."></textarea>
                </div>

                <button type="submit" class="btn" style="width: 100%;">Mesajı Gönder</button>
            </form>
        </div>
    </main>

    <footer>
        <p>© 2026 Meriç Sarıkaya. Tüm hakları saklıdır.</p>
    </footer>

</body>
</html>
